<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AMPLIFY | AI</title>
    <style>
        :root {
            --bg-color: #f8f9fa;
            --accent-color: #000000; /* Minimalist Black */
            --glass-bg: rgba(255, 255, 255, 0.8);
            --user-bubble: #000000;
            --ai-bubble: #ffffff;
            --text-main: #1a1a1a;
            --text-muted: #6c757d;
        }

        body {
            font-family: 'Inter', -apple-system, sans-serif;
            background-color: var(--bg-color);
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            color: var(--text-main);
        }

        #chat-container {
            width: 90%;
            max-width: 500px;
            height: 80vh;
            background: var(--glass-bg);
            backdrop-filter: blur(10px);
            border-radius: 24px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.05);
            display: flex;
            flex-direction: column;
            border: 1px solid rgba(255, 255, 255, 0.3);
            overflow: hidden;
        }

        #chat-header {
            padding: 20px;
            text-align: center;
            border-bottom: 1px solid rgba(0,0,0,0.05);
        }

        #chat-header h1 {
            margin: 0;
            font-size: 1.2rem;
            letter-spacing: 4px;
            font-weight: 800;
            color: var(--accent-color);
        }

        #chat-box {
            flex: 1;
            padding: 20px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 15px;
            scroll-behavior: smooth;
        }

        /* Message Bubbles */
        .message {
            padding: 12px 18px;
            border-radius: 18px;
            max-width: 85%;
            font-size: 14px;
            line-height: 1.5;
            position: relative;
        }

        .user-msg {
            background: var(--user-bubble);
            color: white;
            align-self: flex-end;
            border-bottom-right-radius: 4px;
        }

        .ai-msg {
            background: var(--ai-bubble);
            color: var(--text-main);
            align-self: flex-start;
            border-bottom-left-radius: 4px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.03);
        }

        .meta-info {
            font-size: 10px;
            color: var(--text-muted);
            margin-top: 5px;
            display: block;
        }

        /* Processing Animation */
        .typing {
            display: none;
            align-self: flex-start;
            background: #eee;
            padding: 12px 18px;
            border-radius: 18px;
        }

        .dot {
            display: inline-block;
            width: 6px;
            height: 6px;
            background: #888;
            border-radius: 50%;
            margin-right: 3px;
            animation: wave 1.3s linear infinite;
        }

        .dot:nth-child(2) { animation-delay: -1.1s; }
        .dot:nth-child(3) { animation-delay: -0.9s; }

        @keyframes wave {
            0%, 60%, 100% { transform: translateY(0); }
            30% { transform: translateY(-5px); }
        }

        /* Input Area */
        #input-area {
            padding: 20px;
            display: flex;
            gap: 10px;
            background: white;
        }

        #user-input {
            flex: 1;
            border: none;
            background: #f1f3f5;
            padding: 12px 20px;
            border-radius: 12px;
            outline: none;
            font-size: 14px;
        }

        #send-btn {
            background: var(--accent-color);
            color: white;
            border: none;
            padding: 0 20px;
            border-radius: 12px;
            cursor: pointer;
            font-weight: 600;
            transition: opacity 0.2s;
        }

        #send-btn:disabled { opacity: 0.3; cursor: not-allowed; }

        /* Custom Scrollbar */
        #chat-box::-webkit-scrollbar { width: 4px; }
        #chat-box::-webkit-scrollbar-track { background: transparent; }
        #chat-box::-webkit-scrollbar-thumb { background: #ddd; border-radius: 10px; }
    </style>
</head>
<body>

<div id="chat-container">
    <div id="chat-header">
        <h1>AMPLIFY</h1>
    </div>
    <div id="chat-box">
        <div class="message ai-msg">Hello. I am Amplify. How can I assist you today?</div>
    </div>
    
    <div id="typing-indicator" class="typing" style="margin-left: 20px; margin-bottom: 15px;">
        <span class="dot"></span>
        <span class="dot"></span>
        <span class="dot"></span>
    </div>

    <div id="input-area">
        <input type="text" id="user-input" placeholder="Ask something..." autocomplete="off">
        <button id="send-btn">Send</button>
    </div>
</div>

<script>
    const chatBox = document.getElementById('chat-box');
    const userInput = document.getElementById('user-input');
    const sendBtn = document.getElementById('send-btn');
    const typingIndicator = document.getElementById('typing-indicator');

    function appendMessage(role, text, timeTaken = null) {
        const msgDiv = document.createElement('div');
        msgDiv.className = `message ${role === 'user' ? 'user-msg' : 'ai-msg'}`;
        
        let content = `<div>${text}</div>`;
        if (timeTaken) {
            content += `<span class="meta-info">Processed in ${timeTaken}s</span>`;
        }
        
        msgDiv.innerHTML = content;
        chatBox.appendChild(msgDiv);
        chatBox.scrollTop = chatBox.scrollHeight;
    }

    async function sendMessage() {
        const text = userInput.value.trim();
        if (!text) return;

        // UI Updates
        appendMessage('user', text);
        userInput.value = '';
        userInput.disabled = true;
        sendBtn.disabled = true;
        typingIndicator.style.display = 'block';
        chatBox.scrollTop = chatBox.scrollHeight;

        const startTime = performance.now(); // Start timer

        try {
            const response = await fetch('/ask', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ prompt: text })
            });
            const data = await response.json();
            
            const endTime = performance.now(); // End timer
            const duration = ((endTime - startTime) / 1000).toFixed(2);

            typingIndicator.style.display = 'none';
            appendMessage('ai', data.response, duration);
        } catch (error) {
            typingIndicator.style.display = 'none';
            appendMessage('ai', "Error: Server connection lost.");
        } finally {
            userInput.disabled = false;
            sendBtn.disabled = false;
            userInput.focus();
        }
    }

    sendBtn.onclick = sendMessage;
    userInput.onkeypress = (e) => { if (e.key === 'Enter') sendMessage(); };
</script>

</body>
</html>
